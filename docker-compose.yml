services:
    backend:
        image: mongo:latest
        container_name: grubhunter_backend
        restart: always
        environment:
            MONGO_INITDB_DATABASE: grubhunter
        ports:
            - 27017:27017
        volumes:
            - "./.docker/grubhunter-backend/seed-mongodb.js:/docker-entrypoint-initdb.d/seed-mongodb.js"
            - mongodb_data_container:/data/db

    application:
        image: node:lts-alpine
        ports:
            - 3000:3000
        volumes:
            - "./code:/home/node/code"
        working_dir: /home/node/code/grubhunter-application
        command: "npm run dev"
        environment:
            - HOST=0.0.0.0
            - CHOKIDAR_USEPOLLING=true
            - CHOKIDAR_INTERVAL=100
        depends_on:
            - backend
        tty: true

volumes:
    mongodb_data_container:
